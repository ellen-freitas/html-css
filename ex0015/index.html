  <title>Embed youtube </title>

  <style>
        body

    <style>
    .video-link {
      display: inline-block;
      position: relative;
    }

    .video-thumb {
      width: 560px;
      max-width: 100%;
      border-radius: 8px;
      cursor: pointer;
    }

    .video-link::after {
      content: "▶";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      color: white;
      text-shadow: 0 0 10px black;
      pointer-events: none;
    }
  </style>


    
  </style>

</head>
