<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag HTML</title>
</head>
<body>
    
    <h1>Tags em HTML</h1>
    <strong>
        <hp>Em HTML, podemos inserir os elementos da lista a seguir. Passe o mouse sobre os temas para descobrir qual tag deverá utilizar em cada caso</hp>
    </strong>

    <ul>
        <li><abbr title="Use a tag p">Parágrafo</abbr></li>
        <li><abbr title="Use a tag h1">Título</abbr></li>
        <li><abbr title="Use tag img">Imagens</abbr></li>
        <li><abbr title="Use a tag abbr">Abreviações</abbr></li>
        <li><abbr title="Code">Código-font</abbr></li>
        <li><abbr title="Ol e li">Listas numéras</abbr></li>
        <li><abbr title="ul e li">Listas co dermacadores</abbr></li>
    </ul>

    <!-- Resumo fácil de memorizar
    <ol> → O de Ordem → números
    <ul> → U de Unordered → bolinhas
    <li> → L de List item → item da lista-->

</body>
</html>
