<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador. </p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">

      <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexível">
    </picture>

        <!--
✅ Tela ATÉ 750px
A primeira condição já é verdadeira
👉 usa foto-p.png
para de ler

✅ Tela ENTRE 751px e 1050px
750px ❌ (não passa)
1050px ✅
👉 usa foto-m.png

✅ Tela MAIOR que 1050px
750px ❌
1050px ❌
cai no <img>

👉 usa foto-g.png-->
    

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudio em  HTML.5</p>

    <audio src="audios/musica.mp3" controls autoplay></audio>
    <!--MP3 WAV OGG-->
    <audio preload="metadata" loop>
        <source src="audios/musica.mp3" type="audio/mpeg">
        <source src="audios/musica.ogg" type="audio/ogg">
        <source src="audios/musica.wav" type="audio/wav">
        <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="audios/musica.mp3">Clique aqui para baixar o arquivo MP3</a></p>

    </audio>
    
</body>
</html>
