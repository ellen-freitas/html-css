<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes em CSS</title>
    <style>
        * { /* Configurações globais das CSS */ 
            height: 100%;
        }
        body{
            color: white;
           background-image: linear-gradient(to bottom, #780CFF, #EE00DE, #FE0070, #FF283A, #FFC500);
           background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>
</body>
</html>
