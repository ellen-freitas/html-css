<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
</head>
<style>
    @font-face {
        font-family: 'Pope';
        src: url('fontes/MGF-PopstarPersonalUse.otf') format(opentype);
        font-weight: normal;
        font-size: normal;

        /*
        Tipo de format()
        - opentype (otf)
        - truetype (ttf)
        - embedded-opentype
        - truetype-aat (Apple advance typography)
        - svg
        */
    }
    body{
        font-family: Arial, Helvetica, sans-serif;
    }
    h1 {
        font-family: 'Pope','Times New Roman', Times, serif;
        font-size: 3em;
    }
</style>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Enim eligendi voluptates explicabo ipsam provident itaque ea autem recusandae obcaecati magni, vero architecto ut molestias. Perferendis molestias itaque ratione rerum quisquam.</p>
    
</body>
</html>
