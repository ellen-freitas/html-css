<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {
            background-color: rgb(253, 252, 252);
            height: 300px;
            width: 300px;
            border: 10px solid rgb(228, 163, 211);

            padding: 10px 10px 10px 10px;
           
            margin: auto;
             margin-bottom: 30px;
             text-align: center;
           
        }

        a{
            border: 10px solid red;
            padding: 5px 5px;
        
        }
    </style>

</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplo de box-level, mas os <a href="#">Links são exemplo de caixas inline-level</a>. Vamos ver como tudo isso funciona</p>
    
</body>
</html>
